<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fatima Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Fatima</h1>

    <nav>
      <a href="#">Home</a>
      <a href="#projects">Projects</a>
      <a href="#">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h2>Hi, I'm Fatima</h2>

    <p>
      I build modern and responsive websites using HTML, CSS and JavaScript.
    </p>

    <button id="btnProjects">View My Projects</button>
  </section>

  <!-- PROJECTS -->
  <section id="projects" class="projects">
    <h2>My Projects</h2>

    <div class="cards">

      <div class="card">
        <h3>Project 1</h3>
        <p>Simple landing page</p>
        <button class="open">Open</button>
      </div>

      <div class="card">
        <h3>Project 2</h3>
        <p>ToDo App</p>
        <button class="open">Open</button>
      </div>

      <div class="card">
        <h3>Project 3</h3>
        <p>Weather App</p>
        <button class="open">Open</button>
      </div>

    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="contact">
    <h2>Contact Me</h2>

    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea placeholder="Your Message"></textarea>

    <button>Send</button>
  </section>

  <!-- JS -->
  <script src="main.js"></script>

</body>
</html>
